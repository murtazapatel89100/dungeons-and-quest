<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 128 128"
  fill="none"
>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff4c7" />
      <stop offset="50%" stop-color="#d4a53a" />
      <stop offset="100%" stop-color="#8b6218" />
    </linearGradient>

    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#24170f" />
      <stop offset="100%" stop-color="#120b07" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect
    x="12"
    y="12"
    width="104"
    height="104"
    rx="18"
    fill="url(#bg)"
    stroke="url(#gold)"
    stroke-width="4"
  />

  <!-- Chest Base -->
  <rect
    x="30"
    y="54"
    width="68"
    height="38"
    rx="6"
    fill="none"
    stroke="url(#gold)"
    stroke-width="4"
  />

  <!-- Chest Lid -->
  <path
    d="M30 54C30 36 44 28 64 28C84 28 98 36 98 54"
    fill="none"
    stroke="url(#gold)"
    stroke-width="4"
    stroke-linejoin="round"
  />

  <!-- Lock -->
  <rect
    x="57"
    y="62"
    width="14"
    height="18"
    rx="3"
    fill="none"
    stroke="url(#gold)"
    stroke-width="3"
  />

  <path
    d="M60 62V56C60 52 62 50 64 50C66 50 68 52 68 56V62"
    stroke="url(#gold)"
