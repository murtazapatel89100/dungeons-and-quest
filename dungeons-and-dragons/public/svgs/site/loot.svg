  <!-- Coins -->
  <circle cx="44" cy="42" r="5" fill="url(#gold)" opacity="0.9" />
  <circle cx="84" cy="40" r="5" fill="url(#gold)" opacity="0.9" />
  <circle cx="64" cy="22" r="4" fill="url(#gold)" opacity="0.85" />

  <!-- Sparkles -->
  <path
    d="M22 34L25 40L31 43L25 46L22 52L19 46L13 43L19 40Z"
    fill="url(#gold)"
    opacity="0.8"
  />

  <path
    d="M106 30L108 35L113 37L108 39L106 44L104 39L99 37L104 35Z"
    fill="url(#gold)"
    opacity="0.8"
  />

  <!-- Decorative Bottom Line -->
  <path
    d="M36 102H92"
    stroke="url(#gold)"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.5"
  />
</svg>