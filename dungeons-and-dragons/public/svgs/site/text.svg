<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 128 128"
  fill="none"
>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff4c7" />
      <stop offset="50%" stop-color="#d4a53a" />
      <stop offset="100%" stop-color="#8b6218" />
    </linearGradient>

    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#24170f" />
      <stop offset="100%" stop-color="#120b07" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect
    x="12"
    y="12"
    width="104"
    height="104"
    rx="18"
    fill="url(#bg)"
    stroke="url(#gold)"
    stroke-width="4"
  />

  <!-- Scroll -->
  <rect
    x="28"
    y="28"
    width="72"
    height="72"
    rx="10"
    fill="none"
    stroke="url(#gold)"
    stroke-width="4"
  />

  <!-- Top Roll -->
  <path
    d="M28 38C28 30 34 24 42 24H86C94 24 100 30 100 38"
    stroke="url(#gold)"
    stroke-width="4"
    fill="none"
  />

  <!-- Bottom Roll -->
  <path
    d="M28 90C28 98 34 104 42 104H86C94 104 100 98 100 90"
    stroke="url(#gold)"
    stroke-width="4"
    fill="none"
  />

  <!-- Rune Letters -->
  <text
    x="64"
    y="66"
    text-anchor="middle"
    fill="url(#gold)"
    font-size="26"
    font-family="serif"
    font-weight="bold"
    letter-spacing="2"
  >
    T
  </text>

  <!-- Decorative Lines -->
  <line
    x1="42"
    y1="78"
    x2="86"
    y2="78"
    stroke="url(#gold)"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.7"
  />

  <line
    x1="48"
    y1="88"
    x2="80"
    y2="88"
    stroke="url(#gold)"
    stroke-width="3"
    stroke-linecap="round"
    opacity="0.5"
  />

  <!-- Small Stars -->
  <circle cx="38" cy="44" r="2" fill="url(#gold)" opacity="0.8" />
  <circle cx="90" cy="44" r="2" fill="url(#gold)" opacity="0.8" />
</svg>