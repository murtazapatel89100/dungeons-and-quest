<svg
  xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 128 128"
  fill="none"
>
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff3c4" />
      <stop offset="50%" stop-color="#d6a63a" />
      <stop offset="100%" stop-color="#8a6117" />
    </linearGradient>

    <linearGradient id="paper" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a1b12" />
      <stop offset="100%" stop-color="#140d08" />
    </linearGradient>
  </defs>

  <!-- Book -->
  <rect
    x="20"
    y="18"
    width="88"
    height="92"
    rx="10"
    fill="url(#paper)"
